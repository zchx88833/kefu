# Kefu Backend Application Configuration
# Server Configuration
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}
spring.application.name=kefu-backend
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

# Actuator Configuration
management.server.port=${MANAGEMENT_SERVER_PORT:8080}
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.roles=NONE

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:kefu;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER_CLASS_NAME:}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:xQ7#pZ9&vM2!kL4*sN1@bR3^fT5$gH8%jW6+eY0~dU}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.auto-commit=true

# Allow overriding bean definitions from multiple configuration sources
spring.main.allow-bean-definition-overriding=true
