<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面不存在</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .code { font-size: 120px; font-weight: bold; color: #ddd; }
        h1 { font-size: 24px; color: #333; margin-bottom: 12px; }
        p { font-size: 16px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>页面不存在</h1>
        <p>您访问的页面已被删除或不存在</p>
    </div>
</body>
</html>
