<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你妈死了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.1s;
        }

        .text-container {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stacked-text {
            position: absolute;
            font-size: 50px;
            font-weight: 900;
            font-family: "Microsoft YaHei", sans-serif;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            white-space: nowrap;
        }


    </style>
</head>
<body>
    <div class="text-container">
        <div class="stacked-text" id="text1">你妈逼被狗日成黑洞</div>
        <div class="stacked-text" id="text2">操你祖宗十八代臭逼</div>
        <div class="stacked-text" id="text3">你妈逼里爬满蛆虫卵</div>
        <div class="stacked-text" id="text4">操你妈逼烂掉流黄水</div>
        <div class="stacked-text" id="text5">我操你妈逼里塞满狗屎</div>
        <div class="stacked-text" id="text6">操你妈屄被驴拱成井</div>
        <div class="stacked-text" id="text7">你妈逼里长满绿毛霉</div>
    </div>



    <script>
        const colors = [
            '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', 
            '#00FFFF', '#FF6600', '#9900FF', '#00FF99', '#FF0066',
            '#66FF00', '#0066FF', '#FF3399', '#33FF99', '#9933FF'
        ];

        let flashInterval = null;
        let textInterval = null;
        let colorIndex = 0;

        const texts = [
            document.getElementById('text1'),
            document.getElementById('text2'),
            document.getElementById('text3'),
            document.getElementById('text4'),
            document.getElementById('text5'),
            document.getElementById('text6'),
            document.getElementById('text7')
        ];

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function getRandomOffset() {
            return (Math.random() - 0.5) * 20;
        }

        function updateFlash() {
            document.body.style.backgroundColor = getRandomColor();
        }

        function updateTexts() {
            texts.forEach((text, index) => {
                const scale = 1 + Math.random() * 1.5;
                const rotation = (Math.random() - 0.5) * 30;
                const offsetX = getRandomOffset();
                const offsetY = getRandomOffset();

                text.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale}) rotate(${rotation}deg)`;
                text.style.color = getRandomColor();
                text.style.opacity = 0.3 + Math.random() * 0.7;
                text.style.zIndex = Math.floor(Math.random() * 10);
            });
        }

        function startFlash() {
            if (flashInterval) return;

            flashInterval = setInterval(updateFlash, 100);
            textInterval = setInterval(updateTexts, 80);
        }

        function stopFlash() {
            clearInterval(flashInterval);
            clearInterval(textInterval);
            flashInterval = null;
            textInterval = null;

            document.body.style.backgroundColor = '#ffffff';

            texts.forEach(text => {
                text.style.transform = 'none';
                text.style.color = '#000000';
                text.style.opacity = 1;
            });
        }

        // 自动开始
        startFlash();
    </script>
</body>
</html>
